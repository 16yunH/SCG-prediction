input:
  sample_index: ./artifacts/processed/sample_index.csv
  split_dir: ./artifacts/processed/splits

runtime:
  device: cuda
  seed: 42
  num_workers: 0

optimization:
  epochs: 30
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stop_patience: 6

model:
  input_channels: 6
  window_size: 400
  cnn_channels: [32, 64, 128]
  lstm_hidden: 128
  lstm_layers: 2
  mlp_hidden: [128, 64]
  dropout: 0.2

output:
  runs_dir: ./artifacts/runs
