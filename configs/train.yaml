input:
  split_dir: ./artifacts/processed/v2/splits

runtime:
  device: cuda
  seed: 42
  num_workers: 4
  pin_memory: true
  cache_windows: true
  mmap_arrays: true
  allow_csv_fallback: false
  use_data_parallel: false
  gpu_ids: []

optimization:
  epochs: 80
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stop_patience: 10

model:
  input_channels: 6
  window_size: 400
  cnn_channels: [32, 64, 128]
  lstm_hidden: 128
  lstm_layers: 2
  mlp_hidden: [128, 64]
  dropout: 0.2

output:
  runs_dir: ./artifacts/runs
